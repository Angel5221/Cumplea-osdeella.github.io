
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fase B - Quiz</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
padding:40px;
}

.quiz{
background:white;
padding:25px;
border-radius:10px;
width:420px;
}

.pregunta{
margin-bottom:25px;
}

.opciones{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.opcion{
border:2px solid #ddd;
padding:10px;
border-radius:8px;
cursor:pointer;
text-align:center;
position:relative;
transition:0.2s;
}

.seleccion{
background:#eee;
border-color:#333;
}

.correcta{
background:#b6ffb6;
border-color:green;
}

.incorrecta{
background:#ffb6b6;
border-color:red;
}

.icono{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
font-weight:bold;
font-size:18px;
}

button{
width:100%;
padding:12px;
background:#aaa;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:not-allowed;
}

button.activo{
background:#ff3b5c;
cursor:pointer;
}

#resultado{
margin-top:15px;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="quiz">

<h2>Fase B</h2>

<!-- PREGUNTA 1 -->

<div class="pregunta" data-correcta="2">

<p>1. ¿Cómo nos conocimos?</p>

<div class="opciones">

<div class="opcion" onclick="seleccionar(this)">Jugando LOL</div>
<div class="opcion" onclick="seleccionar(this)">Facebook</div>
<div class="opcion" onclick="seleccionar(this)">En el trabajo</div>
<div class="opcion" onclick="seleccionar(this)">haciendo compras</div>

</div>

</div>


<!-- PREGUNTA 2 -->

<div class="pregunta" data-correcta="2">

<p>2. ¿Que fue lo que te lleve la primera salida?</p>

<div class="opciones">

<div class="opcion" onclick="seleccionar(this)">Nada</div>
<div class="opcion" onclick="seleccionar(this)">Refresco</div>
<div class="opcion" onclick="seleccionar(this)">Rebanada</div>
<div class="opcion" onclick="seleccionar(this)">Agua</div>

</div>

</div>


<!-- PREGUNTA 3 -->

<div class="pregunta" data-correcta="3">

<p>3. ¿Donde fue nuestra primer salida?</p>

<div class="opciones">

<div class="opcion" onclick="seleccionar(this)">Banqueta</div>
<div class="opcion" onclick="seleccionar(this)">Trabajo</div>
<div class="opcion" onclick="seleccionar(this)">Restaurante</div>
<div class="opcion" onclick="seleccionar(this)">Parque</div>

</div>

</div>


<button id="botonEnviar" onclick="verificar()" disabled>
Enviar respuestas
</button>

<p id="resultado"></p>

</div>


<script>

function seleccionar(opcion){

let grupo = opcion.parentElement.children;

/* quitar selección anterior */

for(let i=0;i<grupo.length;i++){
grupo[i].classList.remove("seleccion");
}

/* seleccionar opción */

opcion.classList.add("seleccion");

/* revisar si ya respondieron todo */

revisarCompleto();

}



function revisarCompleto(){

let preguntas = document.querySelectorAll(".pregunta");
let respondidas = 0;

preguntas.forEach(pregunta=>{

let seleccion = pregunta.querySelector(".seleccion");

if(seleccion){
respondidas++;
}

});

let boton = document.getElementById("botonEnviar");

if(respondidas === preguntas.length){

boton.disabled=false;
boton.classList.add("activo");

}else{

boton.disabled=true;
boton.classList.remove("activo");

}

}



function verificar(){

let preguntas = document.querySelectorAll(".pregunta");
let correctas = 0;

preguntas.forEach(pregunta=>{

let correcta = pregunta.dataset.correcta;
let opciones = pregunta.querySelectorAll(".opcion");

opciones.forEach((opcion,index)=>{

opcion.classList.remove("correcta","incorrecta");

let viejo = opcion.querySelector(".icono");

if(viejo) viejo.remove();

let icono = document.createElement("span");
icono.className="icono";

if(index == correcta){

opcion.classList.add("correcta");

icono.innerHTML="✔";
icono.style.color="green";

opcion.appendChild(icono);

}

if(opcion.classList.contains("seleccion") && index != correcta){

opcion.classList.add("incorrecta");

icono.innerHTML="✖";
icono.style.color="red";

opcion.appendChild(icono);

}

if(opcion.classList.contains("seleccion") && index == correcta){

correctas++;

}

});

});

document.getElementById("resultado").innerHTML =
"Correctas: "+correctas+" / "+preguntas.length;

/* si todas son correctas */

if(correctas === preguntas.length){

document.getElementById("resultado").innerHTML =
"🎉 Felicidades has completado los 2";

localStorage.setItem("faseB","completada");

/* regresar al protocolo */

setTimeout(function(){

window.location.href="Amor2.html";

},2000);

}

}

</script>

</body>
</html>
