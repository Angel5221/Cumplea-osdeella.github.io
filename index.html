
<!DOCTYPE html>
<!-- Indica al navegador que el documento es HTML -->

<html lang="es">
<!-- Inicio del documento HTML y define que el idioma es español -->

<head>
<meta charset="UTF-8">
<!-- Permite usar caracteres como ñ, tildes, etc -->
    <link rel="stylesheet" href="Amor.css">
    
<title>Sistema de Seguridad</title>
<!-- Título que aparece en la pestaña del navegador -->

</head>

<body>

<div class="card">
<!-- Contenedor tipo tarjeta -->

<h2>Sistema de Seguridad</h2>
<!-- Título -->

<p>Hay una entrega especial para ti.<br>Confirma tu identidad.</p>
<!-- Texto de instrucciones -->

<label>Fecha de cumpleaños</label><br><br>
<!-- Texto arriba del input -->

<input type="date" id="fecha">
<!-- Campo donde el usuario selecciona una fecha -->

<br>

<button onclick="verificar()">RECIBIR</button>
<!-- Botón que ejecuta la función verificar() cuando se presiona -->

<p id="mensaje"></p>
<!-- Lugar donde aparecerá el resultado -->

<script src="Amor.js"></script>

</body>
</html>
