

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Protocolo</title>

<style>

body{
font-family:Arial;
background:#ffeef5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* tarjeta */

.card{
background:white;
padding:30px;
border-radius:12px;
width:330px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* botones */

button{
margin-top:10px;
padding:10px;
cursor:pointer;
width:100%;
border:none;
border-radius:6px;
background:#ff7aa8;
color:white;
font-weight:bold;
}

button:hover{
background:#ff5c96;
}

/* HELLO KITTY */

.regalo{
margin-top:20px;
cursor:pointer;
display:none;
position:relative;
}

/* imagen kitty */

.regalo img{
width:140px;
height:auto;
animation:saltar 1.2s infinite;
}

/* animación salto */

@keyframes saltar{

0%{transform:translateY(0);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0);}

}

/* corazones */

.corazon{
position:absolute;
font-size:18px;
animation:subir 2s linear forwards;
pointer-events:none;
}

/* animación corazón */

@keyframes subir{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-90px);
opacity:0;
}

}

</style>

</head>

<body>

<div class="card">

<h2>Protocolo de Entrega</h2>

<p>Estado de procesamiento <span id="contador">0/2</span></p>

<br>

<button onclick="irPuzzle()">Completar puzzle </button>

<button onclick="irQuiz()">Completar Preguntas</button>

<button onclick="reiniciar ()">Reiniciar protocolo</button>

<p id="mensaje"></p>

<div class="regalo" id="regalo" onclick="abrirRegalo()">

<img src="Hellokitty.jpeg">

<p>🐱 Dar click para abrir</p>

</div>

</div>

<script>

let progreso = 0;
let corazonesActivos = false;

/* revisar progreso */

function revisarProgreso(){

progreso = 0;

if(localStorage.getItem("faseA") === "completada"){
progreso++;
}

if(localStorage.getItem("faseB") === "completada"){
progreso++;
}

actualizar();

}

/* ir al puzzle */

function irPuzzle(){

window.location.href="puzzleAmor.html";

}

/* ir al quiz */

function irQuiz(){

window.location.href="preguntas.html";

}

/* actualizar contador */

function actualizar(){

document.getElementById("contador").innerHTML = progreso + "/2";

if(progreso === 2){

document.getElementById("mensaje").innerHTML =
"🎉 Protocolo completado";

document.getElementById("regalo").style.display="block";

activarCorazones();

}

}

/* reiniciar */

function reiniciar(){

localStorage.removeItem("faseA");
localStorage.removeItem("faseB");

progreso = 0;

document.getElementById("regalo").style.display="none";

document.getElementById("mensaje").innerHTML =
"Protocolo reiniciado";

actualizar();

}

/* abrir sorpresa */

function abrirRegalo(){

window.location.href="Carta.html";

}

/* corazones animados */

function activarCorazones(){

if(corazonesActivos) return;

corazonesActivos = true;

setInterval(function(){

let contenedor = document.getElementById("regalo");

if(contenedor.style.display !== "block") return;

let corazon = document.createElement("div");

corazon.className="corazon";

corazon.innerHTML="❤️";

corazon.style.left=Math.random()*120+"px";

contenedor.appendChild(corazon);

setTimeout(function(){

corazon.remove();

},2000);

},500);

}

/* iniciar */

revisarProgreso();

</script>

</body>
</html>
