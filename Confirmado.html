<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carta</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial, Helvetica, sans-serif;
}

.carta{
    width:320px;
    padding:40px;
    background:white;
    border-radius:15px;
    text-align:center;
    font-size:26px;
    color:#ff4d6d;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    animation:aparecer 1s ease;
}

@keyframes aparecer{
    from{
        transform:scale(0.7);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="carta">
Sabía que ibas a aceptar 🫶
</div>

</body>
</html>
